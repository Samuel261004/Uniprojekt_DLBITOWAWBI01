<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin - Serviceanfragen verwalten">
    <title>Serviceanfragen verwalten - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body th:classappend="${fontSize} + ' ' + (${highContrast} ? 'high-contrast' : '')" role="application">
    <header role="banner">
        <nav role="navigation" aria-label="Admin Navigation">
            <a href="/" class="icon-btn" title="Startseite" aria-label="Zurück zur Startseite">
                <i class="fas fa-home" aria-hidden="true"></i>
            </a>
            <form th:action="@{/logout}" method="post" style="display: flex;">
                <button type="submit" class="btn logout" aria-label="Abmelden">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i>
                    Abmelden
                </button>
            </form>
        </nav>
    </header>

    <main role="main">
        <h1>
            <i class="fas fa-tasks" aria-hidden="true"></i>
            Serviceanfragen verwalten
        </h1>

        <section aria-labelledby="requestsHeading">
            <h2 id="requestsHeading">Alle eingegangenen Anfragen</h2>

            <div style="overflow-x: auto; border-radius: 4px; border: 1px solid #BDBDBD;">
                <table style="width: 100%; border-collapse: collapse;" role="table" aria-label="Liste der Serviceanfragen">
                    <thead style="background-color: #1976D2; color: white;">
                        <tr>
                            <th style="padding: 1rem; text-align: left; border-bottom: 2px solid #0D47A1;">ID</th>
                            <th style="padding: 1rem; text-align: left; border-bottom: 2px solid #0D47A1;">Betreff</th>
                            <th style="padding: 1rem; text-align: left; border-bottom: 2px solid #0D47A1;">Benutzer</th>
                            <th style="padding: 1rem; text-align: left; border-bottom: 2px solid #0D47A1;">Status</th>
                            <th style="padding: 1rem; text-align: left; border-bottom: 2px solid #0D47A1;">Aktionen</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="request : ${requests}" style="border-bottom: 1px solid #E0E0E0;">
                            <td style="padding: 1rem;" th:text="${request.id}"></td>
                            <td style="padding: 1rem;" th:text="${request.subject}"></td>
                            <td style="padding: 1rem;" th:text="${request.createdBy.username}"></td>
                            <td style="padding: 1rem;">
                                <span th:if="${request.status == 'PENDING'}" 
                                      style="background-color: #FFF3E0; color: #E65100; padding: 0.25rem 0.75rem; border-radius: 12px; font-weight: 600;">
                                    <i class="fas fa-clock" aria-hidden="true"></i> Ausstehend
                                </span>
                                <span th:if="${request.status == 'ACCEPTED'}" 
                                      style="background-color: #E8F5E9; color: #1B5E20; padding: 0.25rem 0.75rem; border-radius: 12px; font-weight: 600;">
                                    <i class="fas fa-check-circle" aria-hidden="true"></i> Akzeptiert
                                </span>
                                <span th:if="${request.status == 'REJECTED'}" 
                                      style="background-color: #FFEBEE; color: #C62828; padding: 0.25rem 0.75rem; border-radius: 12px; font-weight: 600;">
                                    <i class="fas fa-times-circle" aria-hidden="true"></i> Abgelehnt
                                </span>
                            </td>
                            <td style="padding: 1rem;">
                                <div style="display: flex; gap: 0.25rem; flex-wrap: wrap;">
                                    <form th:action="@{/admin/request/{id}/accept(id=${request.id})}"
                                          method="post"
                                          style="margin: 0;">
                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}" />
                                        <button type="submit" 
                                                class="btn-sm"
                                                style="background-color: #388E3C; border-color: #1B5E20; padding: 0.5rem 0.75rem; font-size: 0.85rem; width: auto;"
                                                title="Anfrage akzeptieren"
                                                aria-label="Anfrage akzeptieren">
                                            <i class="fas fa-check" aria-hidden="true"></i>
                                        </button>
                                    </form>

                                    <form th:action="@{/admin/request/{id}/reject(id=${request.id})}"
                                          method="post"
                                          style="margin: 0;">
                                        <input type="hidden"
                                               th:name="${_csrf.parameterName}"
                                               th:value="${_csrf.token}" />
                                        <button type="submit" 
                                                class="btn-sm"
                                                style="background-color: #D32F2F; border-color: #B71C1C; padding: 0.5rem 0.75rem; font-size: 0.85rem; width: auto;"
                                                title="Anfrage ablehnen"
                                                aria-label="Anfrage ablehnen">
                                            <i class="fas fa-times" aria-hidden="true"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <p th:if="${requests.isEmpty()}" style="text-align: center; color: #999; padding: 2rem;">
                <i class="fas fa-inbox" aria-hidden="true"></i>
                Keine Anfragen vorhanden.
            </p>
        </section>

        <section aria-labelledby="statsHeading" style="margin-top: 2rem; padding: 1rem; background-color: #E8F5E9; border-radius: 4px;">
            <h2 id="statsHeading" style="font-size: 0.9rem; color: #1B5E20; margin-top: 0;">
                <i class="fas fa-chart-bar" aria-hidden="true"></i>
                Statistiken
            </h2>
            <p>
                Gesamt: <span th:text="${requests.size()}"></span> Anfragen |
                <i class="fas fa-clock" aria-hidden="true"></i>
                Ausstehend
            </p>
        </section>
    </main>

    <script th:src="@{/script/script.js}" defer></script>
</body>
</html>
