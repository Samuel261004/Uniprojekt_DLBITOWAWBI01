<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rollenverwaltung</title>
    <meta charset="UTF-8">

<link th:href="@{static/css/style.css}" rel="stylesheet" />
</head>
<body>
    <header>
        <form th:action="@{/logout}" method="post">
        <input type="submit" class="logout" value="Logout">
        </form>
    </header>
<div class="container">

    <h1>Rollenverwaltung</h1>

    <form th:action="@{/admin/role-management}"
          method="post">

        <div class="form-group">
            <label for="userId">Benutzer-ID</label>
            <input type="number"
                   id="userId"
                   name="userId"
                   required
                   min="1">
        </div>

        <div class="form-group">
            <label for="role">Neue Rolle</label>

            <select id="role"
                    name="role"
                    required>

                <option value="">Bitte auswählen</option>
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>

            </select>
        </div>

        <button type="submit">
            Rolle ändern
        </button>

    </form>

    <a href="/" class="back-link">
        Zur Startseite
    </a>

</div>

</body>
</html>
