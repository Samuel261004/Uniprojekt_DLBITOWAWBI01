<!DOCTYPE html>
<html xmlns:th="https://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuels-Forum/Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="wrapper">
        <form th:action="@{/login}" method="POST" class="form">
            <div class="h1">
                <h1>Forum</h1>
            </div>
            <div class="input-box">
                <label for="username">Benutzername</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-box">
                <label for="password">Passwort</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div>
            <div class="con">
                <button type="submit" class="btn">Login</button>
                <a class="registerLink" href="/register">Registrieren</a>
            </div>
                <div th:if="${param.logout}" class="loggedOut">
                    <p>Sie wurden abgemeldet.</p>
                </div>
                <div th:if="${param.error}" class="error">
                    <p>Falscher Benutzername oder Passwort.</p>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
