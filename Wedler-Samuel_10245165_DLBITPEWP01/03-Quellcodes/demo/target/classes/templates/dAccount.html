<!DOCTYPE html>
<html xmlns:th="https://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuels-Forum/deleteAccount</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="wrapper">
    <form th:action="@{/dAccount}" method="POST" class="form">
        <div class="h1">
            <h1>Löschen sie ihren Account</h1>
        </div>
        <div>
            <p>Name: <span th:text="${currentUser.name}"></span></p>
        </div>
        <div class="input-box">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div>
            <div class="con">
                <button type="submit" class="btn">Löschen</button>
                <a class="registerLink" href="/dashboard">Abbrechen</a>
            </div>
            <div th:if="${param.error}" class="error">
                <p>Falsches Passwort.</p>
            </div>
        </div>
    </form>
</div>
</body>
</html>
