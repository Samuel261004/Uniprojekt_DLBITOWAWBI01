<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Samuels-Forum/My-Posts</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

<header class="header">
    <form th:action="@{/logout}" method="post">
        <input type="submit" class="logout" value="Logout">
    </form>
</header>

<div class="page">
    <div class="menu">
        <ul class="posts">
            <li><a href="/dashboard" class="ul2">Dashboard</a></li>
            <li><a tabindex="0" aria-current="page" class="ul1">My Posts</a></li>
        </ul>
    </div>

    <div class="notmenu">
        <h2>My Posts</h2>
        <a href="/write" class="plus">+</a>
        <div th:if="${#lists.isEmpty(userPosts)}">
            <p>Sie haben noch nichts veröffentlicht.</p>
        </div>

        <div th:if="${!#lists.isEmpty(userPosts)}">
            <ul class="posts">
                <li th:each="post : ${userPosts}">
                    <div class="pfpname">
                    <p th:text="${post.userID}" class="pfp"> </p>
                    <p th:text="${post.user.name}" class="name"></p>
                    </div>
                    <div class="postBody">
                    <h3 th:text="${post.title}">Title</h3>
                    <p th:utext="${post.content}">Content</p>
                    </div>
                    <small th:text="${post.dateTime}">Date</small>
                    <a th:href="@{/edit/{id}(id=${post.postID})}" class="view-details-btn">Edit</a>
                    <form th:action="@{/delete/{id}(id=${post.postID})}" method="post"
                          onsubmit="return confirm('Möchtest du diesen Post wirklich löschen?');"
                          style="display:inline;">
                        <input type="submit" value="Löschen" class="delete-btn">
                    </form>
                </li>
            </ul>
			<div class="pagination">
						    <ul>
						        <li th:if="${currentPage > 0}">
						            <a th:href="@{/dashboard(page=${currentPage - 1})}">← Zurück</a>
						        </li>
						        <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
						            <a th:href="@{/dashboard(page=${i})}"
						               th:text="${i + 1}"
						               th:classappend="${i == currentPage} ? 'active' : ''"></a>
						        </li>
						        <li th:if="${currentPage < totalPages - 1}">
						            <a th:href="@{/dashboard(page=${currentPage + 1})}">Weiter →</a>
						        </li>
						    </ul>
						</div>
        </div>
    </div>
    <div class="menu2">
        <p>Profil</p>
        <details>
            <p>Name: <span th:text="${currentUser.name}"></span></p>
            <p>ID: <span th:text="${currentUser.USERID}"></span></p>
            <p>Email: <span th:text="${currentUser.email}"></span></p>
            <p>Erstellungsdatum: <span th:text="${currentUser.date}"></span></p>
            <a href="dAccount">Account löschen</a>
        </details>
    </div>
</div>

</body>
</html>
